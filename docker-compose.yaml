services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creditcardhoroscope
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    ports:
      - "8080:8080"
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy
      

  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env
    depends_on:
      - api

volumes:
  pgdata:
